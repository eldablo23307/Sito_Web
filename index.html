<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Eldablo Site</title>
    <script src="script.js"></script>
</head>
<body>
	<div class="MainFrame">
	    <h1>Welcome To My Website</h1>
	    <br>
	    <br>
	    <div class="PageFormatting">
	    	<div class="LeftColumn">
			<button type="button">New Page</button>
			<button type="button">Chat</button>
		</div>
		<div class="CenterColumn">
			<h3>News</h3>
		</div>
		<div class="RightColumn">
			<h4>Contact Info</h4>
		</div>
	    </div> 
	    <div id="GuestBook">
		<h2>Guest Book</h2>
	    	<form id="GuestBookForm" action="https://eldablo2307.pythonanywhere.com/saveData" method="POST">
    			<br>
    			<label for="GuestBookFormUrl">Url: </label>
    			<input type="url" id="GuestBookFormUrl" name="GuestBookFormUrl" placeholder="https://" required>
   			<br>
   			<label for="GuestBookFormMessage">Message: </label>
   			<textarea id="GuestBookFormMessage" name="GuestBookFormMessage" required placeholder="Message" maxlength="100"></textarea> 
    			<br>
    			<button type="submit">Send</button>
		</form>
		<h3>Message</h3>
		<div id="GuestBookMessage">	
		</div>
	    </div>
	</div>
</body>
</html>
